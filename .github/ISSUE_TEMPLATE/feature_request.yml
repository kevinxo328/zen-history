name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like and why it would be useful.
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: input
    id: contact-email
    attributes:
      label: Contact Email
      description: Optional. We may reach out if we need more details.
      placeholder: "e.g. you@example.com"
    validations:
      required: false

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Optional. Attach screenshots, mockups, or any other context.
      placeholder: "Paste logs or drag and drop screenshots here."
    validations:
      required: false
